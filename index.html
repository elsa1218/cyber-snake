<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 赛博贪吃蛇 | Cyber Snake</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1e 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .container {
            text-align: center;
            padding: 10px;
        }
        h1 {
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
            color: #00ffff;
            font-size: 14px;
        }
        canvas {
            border: 2px solid #00ffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            background: #0a0a1e;
            max-width: 100%;
            max-height: 60vh;
        }
        .controls {
            margin-top: 15px;
            color: #646496;
            font-size: 12px;
        }
        .mobile-controls {
            display: none;
            margin-top: 15px;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .mobile-controls button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(145deg, #008080, #00ffff);
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
        }
        .mobile-controls button:active {
            transform: scale(0.95);
        }
        .btn-row { display: flex; gap: 10px; justify-content: center; }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .overlay.hidden { display: none; }
        .menu {
            text-align: center;
            color: white;
        }
        .menu h2 {
            font-size: 36px;
            color: #00ffff;
            text-shadow: 0 0 30px #00ffff;
            margin-bottom: 20px;
            animation: rainbow 2s linear infinite;
        }
        @keyframes rainbow {
            0% { color: #ff0000; }
            17% { color: #ff8800; }
            33% { color: #ffff00; }
            50% { color: #00ff00; }
            67% { color: #0088ff; }
            83% { color: #ff00ff; }
            100% { color: #ff0000; }
        }
        .menu p {
            color: #646496;
            margin: 10px 0;
            font-size: 14px;
        }
        .menu .start-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(145deg, #008080, #00ffff);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.4);
        }
        .menu .start-btn:hover {
            transform: scale(1.05);
        }
        .skin-selector {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .skin-btn {
            padding: 8px 12px;
            border: 2px solid #00ffff;
            border-radius: 8px;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        .skin-btn.active {
            background: #00ffff;
            color: #0a0a1e;
        }
        .leaderboard {
            background: rgba(0, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .leaderboard h3 {
            color: #ff64c8;
            margin-bottom: 10px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            margin: 5px 0;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 5px;
            color: #00ffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 赛博贪吃蛇</h1>
        <div class="stats">
            <span>🏆 分数：<b id="score">0</b></span>
            <span>⚡ 等级：<b id="level">1</b></span>
            <span>🎭 皮肤：<b id="skin-name">cyber</b></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="mobile-controls" id="mobileControls">
            <div class="btn-row">
                <button onclick="setDirection(0, -1)">⬆️</button>
            </div>
            <div class="btn-row">
                <button onclick="setDirection(-1, 0)">⬅️</button>
                <button onclick="togglePause()">⏸️</button>
                <button onclick="setDirection(1, 0)">➡️</button>
            </div>
            <div class="btn-row">
                <button onclick="setDirection(0, 1)">⬇️</button>
            </div>
        </div>
        <div class="controls">
            ↑↓←→ 移动 | P 暂停 | 1-5 换皮肤 | H 排行榜 | 空格开始
        </div>
    </div>

    <!-- 主菜单 -->
    <div class="overlay" id="menuOverlay">
        <div class="menu">
            <h2>🐍 CYBER SNAKE</h2>
            <p>赛博朋克贪吃蛇</p>
            <button class="start-btn" onclick="startGame()">🎮 开始游戏</button>
            <div class="skin-selector">
                <button class="skin-btn active" onclick="setSkin('cyber')">🤖</button>
                <button class="skin-btn" onclick="setSkin('classic')">🐍</button>
                <button class="skin-btn" onclick="setSkin('rainbow')">🦄</button>
                <button class="skin-btn" onclick="setSkin('fire')">🔥</button>
                <button class="skin-btn" onclick="setSkin('ghost')">👻</button>
            </div>
            <p style="margin-top: 20px;">按 H 查看排行榜</p>
        </div>
    </div>

    <!-- 排行榜 -->
    <div class="overlay hidden" id="leaderboardOverlay">
        <div class="menu">
            <h2>🏆 排行榜</h2>
            <div class="leaderboard" id="leaderboardList">
                <p>暂无记录</p>
            </div>
            <button class="start-btn" onclick="closeLeaderboard()" style="margin-top: 15px;">关闭</button>
        </div>
    </div>

    <!-- 游戏结束 -->
    <div class="overlay hidden" id="gameOverOverlay">
        <div class="menu">
            <h2>💀 GAME OVER</h2>
            <p style="font-size: 24px; color: #00ffff;">最终分数：<b id="finalScore">0</b></p>
            <button class="start-btn" onclick="startGame()">🔄 再来一局</button>
            <button class="start-btn" onclick="showMenu()" style="margin-top: 10px; background: linear-gradient(145deg, #646496, #9696c8);">📋 返回菜单</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const CELL_SIZE = 20;
        const GRID_W = canvas.width / CELL_SIZE;
        const GRID_H = canvas.height / CELL_SIZE;
        
        // 颜色
        const COLORS = {
            bg: '#0a0a1e',
            snakeHead: '#00ffff',
            snakeBody: '#008080',
            food: '#ff0080',
            grid: '#1e1e3c',
            text: '#00ffff',
            glow: '#ff64c8'
        };

        // 皮肤
        const SKINS = {
            cyber: { emoji: '🤖', color: COLORS.snakeHead },
            classic: { emoji: '🐍', color: '#00c800' },
            rainbow: { emoji: '🦄', color: '#ff00ff' },
            fire: { emoji: '🔥', color: '#ff6400' },
            ghost: { emoji: '👻', color: '#c8c8c8' }
        };

        // 食物类型
        const FOOD_TYPES = {
            normal: { emoji: '🍎', color: COLORS.food, points: 10 },
            double: { emoji: '⭐', color: '#ffd700', points: 20 },
            speed: { emoji: '⚡', color: '#00ff00', points: 15 },
            slow: { emoji: '🐌', color: '#0064ff', points: 15 },
            bonus: { emoji: '💎', color: '#ff00ff', points: 50 }
        };

        // 游戏状态
        let snake = [];
        let direction = { x: 1, y: 0 };
        let food = {};
        let score = 0;
        let level = 1;
        let gameLoop = null;
        let currentSkin = 'cyber';
        let leaderboard = JSON.parse(localStorage.getItem('snakeLeaderboard') || '[]');
        let isPaused = false;
        let isGameRunning = false;

        // 初始化游戏
        function initGame() {
            snake = [
                { x: Math.floor(GRID_W / 2), y: Math.floor(GRID_H / 2) }
            ];
            direction = { x: 1, y: 0 };
            score = 0;
            level = 1;
            isPaused = false;
            spawnFood();
            updateStats();
        }

        // 生成食物
        function spawnFood() {
            let type = 'normal';
            if (Math.random() < 0.2) {
                const types = ['double', 'speed', 'slow', 'bonus'];
                type = types[Math.floor(Math.random() * types.length)];
            }
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID_W),
                    y: Math.floor(Math.random() * GRID_H)
                };
            } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
            
            food = { ...pos, ...FOOD_TYPES[type], type };
        }

        // 更新游戏
        function update() {
            if (isPaused || !isGameRunning) return;

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 碰撞检测
            if (head.x < 0 || head.x >= GRID_W || head.y < 0 || head.y >= GRID_H ||
                snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += food.points;
                if (score % 50 === 0) {
                    level++;
                }
                spawnFood();
                updateStats();
            } else {
                snake.pop();
            }

            draw();
        }

        // 绘制
        function draw() {
            // 背景
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 网格
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += CELL_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += CELL_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // 蛇
            const skin = SKINS[currentSkin];
            snake.forEach((seg, i) => {
                ctx.fillStyle = i === 0 ? skin.color : COLORS.snakeBody;
                ctx.beginPath();
                ctx.roundRect(
                    seg.x * CELL_SIZE + 1,
                    seg.y * CELL_SIZE + 1,
                    CELL_SIZE - 2,
                    CELL_SIZE - 2,
                    5
                );
                ctx.fill();

                // 蛇头 emoji
                if (i === 0) {
                    ctx.font = `${CELL_SIZE}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(skin.emoji,
                        seg.x * CELL_SIZE + CELL_SIZE / 2,
                        seg.y * CELL_SIZE + CELL_SIZE / 2
                    );
                }
            });

            // 食物
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2,
                0,
                Math.PI * 2
            );
            ctx.fillStyle = COLORS.glow;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fillStyle = food.color;
            ctx.fill();

            // 食物 emoji
            ctx.font = `${CELL_SIZE}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(food.emoji,
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2
            );
        }

        // 更新统计
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('skin-name').textContent = currentSkin;
        }

        // 设置方向
        function setDirection(x, y) {
            if (direction.x === -x && direction.y === -y) return;
            direction = { x, y };
        }

        // 设置皮肤
        function setSkin(skin) {
            currentSkin = skin;
            document.querySelectorAll('.skin-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            updateStats();
        }

        // 切换暂停
        function togglePause() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
        }

        // 开始游戏
        function startGame() {
            document.getElementById('menuOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            initGame();
            isGameRunning = true;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 1000 / (8 + level));
            draw();
        }

        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            
            // 保存成绩
            leaderboard.push({ score, level, date: Date.now() });
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 10);
            localStorage.setItem('snakeLeaderboard', JSON.stringify(leaderboard));
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // 显示菜单
        function showMenu() {
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('menuOverlay').classList.remove('hidden');
        }

        // 显示排行榜
        function showLeaderboard() {
            const list = document.getElementById('leaderboardList');
            if (leaderboard.length === 0) {
                list.innerHTML = '<p>暂无记录</p>';
            } else {
                list.innerHTML = leaderboard.map((entry, i) => `
                    <div class="leaderboard-item">
                        <span>${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`} ${new Date(entry.date).toLocaleDateString()}</span>
                        <span>${entry.score} 分 (Lv.${entry.level})</span>
                    </div>
                `).join('');
            }
            document.getElementById('leaderboardOverlay').classList.remove('hidden');
        }

        // 关闭排行榜
        function closeLeaderboard() {
            document.getElementById('leaderboardOverlay').classList.add('hidden');
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isGameRunning) {
                startGame();
            } else if (e.code === 'KeyP') {
                togglePause();
            } else if (e.code === 'KeyH') {
                showLeaderboard();
            } else if (e.code === 'ArrowUp') setDirection(0, -1);
            else if (e.code === 'ArrowDown') setDirection(0, 1);
            else if (e.code === 'ArrowLeft') setDirection(-1, 0);
            else if (e.code === 'ArrowRight') setDirection(1, 0);
            else if (e.code === 'Digit1') setSkin('cyber');
            else if (e.code === 'Digit2') setSkin('classic');
            else if (e.code === 'Digit3') setSkin('rainbow');
            else if (e.code === 'Digit4') setSkin('fire');
            else if (e.code === 'Digit5') setSkin('ghost');
        });

        // 检测移动设备
        if ('ontouchstart' in window) {
            document.getElementById('mobileControls').style.display = 'flex';
        }

        // 初始绘制
        draw();
    </script>
</body>
</html>
